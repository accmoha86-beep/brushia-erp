# Brushia ERP — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

name: brushia-erp-prod

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: brushia-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - brushia-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: brushia-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - brushia-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  postgres:
    image: postgres:16-alpine
    container_name: brushia-postgres-prod
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - brushia-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  redis:
    image: redis:7-alpine
    container_name: brushia-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - brushia-net

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  brushia-net:
    driver: bridge
